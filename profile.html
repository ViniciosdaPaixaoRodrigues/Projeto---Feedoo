<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Delivery</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para os ícones de engrenagem e logout -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="profile-page">
    <h1 class="profile-main-title">Perfil</h1>
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <div class="avatar-placeholder">
                    <i class="fa-solid fa-xmark"></i>
                </div>
            </div>
            <div class="profile-info-list">
                <div class="info-item">
                    <span class="info-label">Nome:</span>
                    <div class="info-value-box"></div>
                </div>
                <div class="info-item">
                    <span class="info-label">Email:</span>
                    <div class="info-value-box"></div>
                </div>
                <div class="info-item">
                    <span class="info-label">Telefone:</span>
                    <div class="info-value-box"></div>
                </div>
                <div class="info-item">
                    <span class="info-label">Posição:</span>
                    <div class="info-value-box"></div>
                </div>
                <div class="info-item">
                    <span class="info-label">Status:</span>
                    <div class="info-value-box"></div>
                </div>
            </div>
        </div>
        <div class="profile-footer">
            <button class="icon-btn settings-btn"><i class="fa-solid fa-gear"></i></button>
            <button class="icon-btn logout-btn" onclick="window.location.href='index.html'"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>
    </div>
</body>
</html>
