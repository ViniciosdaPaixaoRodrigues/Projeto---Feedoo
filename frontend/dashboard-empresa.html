<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Empresa - Elite Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container">
    <h1 class="logo">Minhas Lojas</h1>

    <div>
      <button class="btn btn-outline" onclick="openEmpresaPerfil()">
        Meu Perfil
      </button>
    </div>
    <div>
      <button class="btn btn-ghost" onclick="handleLogout()">
        Sair
      </button>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="container">
  <div class="dashboard-header">
    <div>
      <h2>Gerenciar Lojas</h2>
      <p class="subtitle">Total de lojas: <span id="totalLojas">0</span></p>
    </div>

    <button class="btn btn-primary" onclick="openNovaLojaModal()">
      + Nova Loja
    </button>
  </div>

  <div id="lojasGrid" class="grid grid-3"></div>
</main>

<!-- ============================================ -->
<!-- MODAL LOJA -->
<!-- ============================================ -->
<div id="modalLoja" class="modal hidden">
  <div class="modal-content modal-lg">

    <div class="modal-header">
      <h2 id="modalTitle">Criar Nova Loja</h2>
      <button class="modal-close" onclick="closeModal('modalLoja')">×</button>
    </div>

    <form id="formLoja" onsubmit="handleSaveLoja(event)">
      <div class="form-grid">

        <div class="form-group col-2">
          <label for="loja-nome">Nome *</label>
          <input type="text" id="loja-nome" required>
        </div>

        <div class="form-group col-2">
          <label for="loja-descricao">Descrição</label>
          <input type="text" id="loja-descricao">
        </div>

        <div class="form-group">
          <label for="loja-telefone">Telefone</label>
          <input type="tel" id="loja-telefone">
        </div>

        <div class="form-group">
          <label for="loja-email">Email *</label>
          <input type="email" id="loja-email" required>
        </div>

        <div class="form-group">
          <label for="loja-cep">CEP</label>
          <input type="text" id="loja-cep">
        </div>

        <div class="form-group">
          <label for="loja-logradouro">Logradouro</label>
          <input type="text" id="loja-logradouro">
        </div>

        <div class="form-group">
          <label for="loja-numero">Número</label>
          <input type="text" id="loja-numero">
        </div>

        <div class="form-group">
          <label for="loja-bairro">Bairro</label>
          <input type="text" id="loja-bairro">
        </div>

        <div class="form-group">
          <label for="loja-cidade">Cidade</label>
          <input type="text" id="loja-cidade">
        </div>

        <div class="form-group">
          <label for="loja-estado">Estado</label>
          <input type="text" id="loja-estado" maxlength="2">
        </div>

        <div class="form-group">
          <label for="loja-abertura">Abertura</label>
          <input type="time" id="loja-abertura">
        </div>

        <div class="form-group">
          <label for="loja-fechamento">Fechamento</label>
          <input type="time" id="loja-fechamento">
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('modalLoja')">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
          Salvar
        </button>
      </div>
    </form>

  </div>
</div>

<!-- ============================================ -->
<!-- MODAL PERFIL EMPRESA -->
<!-- ============================================ -->
<div id="modalEmpresa" class="modal hidden">
  <div class="modal-content modal-lg">

    <div class="modal-header">
      <h2>Meu Perfil</h2>
      <button class="modal-close" onclick="closeModal('modalEmpresa')">×</button>
    </div>

    <form id="formEmpresa" onsubmit="handleSaveEmpresa(event)">
      <div class="form-grid">

        <div class="form-group col-2">
          <label>Nome</label>
          <input type="text" id="emp-nome" required>
        </div>

        <div class="form-group col-2">
          <label>Email</label>
          <input type="email" id="emp-email" required>
        </div>

        <!-- REGRA CPF/CNPJ -->
        <div class="form-group">
          <label>CNPJ</label>
          <input type="text" id="emp-cnpj" oninput="togglePessoa('cnpj')">
        </div>

        <div class="form-group">
          <label>CPF</label>
          <input type="text" id="emp-cpf" oninput="togglePessoa('cpf')">
        </div>

        <div class="form-group col-2">
          <label>Nova Senha</label>
          <input type="password" id="emp-senha">
        </div>

        <div class="form-group col-2">
          <label>Confirmar Senha</label>
          <input type="password" id="emp-confirmar">
        </div>

      </div>

      <!-- ZONA DE PERIGO -->
      <div style="margin-top: 20px; padding: 15px; border: 1px solid #ff4d4d; border-radius: 8px; background: #fff5f5;">
        <h3 style="color: #ff4d4d; margin-bottom: 10px;">
          Zona de perigo
        </h3>

        <p style="font-size: 14px; color: #666; margin-bottom: 15px;">
          Encerrar sua conta deixará a empresa inativa.
        </p>

        <button
          type="button"
          class="btn btn-danger"
          onclick="handleFecharContaEmpresa()"
          style="background:#ff4d4d; color:white; border:none; width: 100%;"
        >
          Encerrar conta
        </button>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline" onclick="closeModal('modalEmpresa')">
          Cancelar
        </button>
        <button type="submit" class="btn btn-primary">
          Salvar
        </button>
      </div>
    </form>

  </div>
</div>

<!-- SCRIPTS -->
<script src="config.js"></script>
<script src="dashboard-empresa.js"></script>

</body>
</html>
