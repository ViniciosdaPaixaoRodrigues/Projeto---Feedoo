<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Empresa - Elite Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
  <div class="login-box" style="position: relative;">
    <button class="btn btn-ghost" onclick="window.location.href='index.html'" style="position: absolute; top: 10px; left: 10px; padding: 5px 10px; font-size: 12px;">← Início</button>
    <!-- Header -->
    <div class="login-header">
      <h1>🍐 Elite Empresa</h1>
      <p>Cadastrar Empresa</p>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="pf">Pessoa Física</button>
      <button class="tab-btn" data-tab="pj">Pessoa Jurídica</button>
    </div>

    <!-- PF Tab -->
    <div id="pf" class="tab-content active">
      <form onsubmit="handleCadastro(event, 'PF')">
        <!-- Nome -->
        <div class="form-group">
          <label for="nome-pf">Nome Completo *</label>
          <input type="text" id="nome-pf" placeholder="Seu nome completo" required>
        </div>

        <!-- CPF -->
        <div class="form-group">
          <label for="cpf">CPF *</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" required>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email-pf">Email *</label>
          <input type="email" id="email-pf" placeholder="seu@email.com" required>
        </div>

        <!-- Telefone -->
        <div class="form-group">
          <label for="telefone-pf">Telefone *</label>
          <input type="tel" id="telefone-pf" placeholder="(11) 99999-0000" required>
        </div>

        <!-- Descrição -->
        <div class="form-group">
          <label for="descricao-pf">Descrição do Negócio</label>
          <textarea id="descricao-pf" placeholder="Descreva seu negócio..." rows="3"></textarea>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <label for="senha-pf">Senha *</label>
          <input type="password" id="senha-pf" placeholder="Mínimo 6 caracteres" required>
        </div>

        <!-- Confirmar Senha -->
        <div class="form-group">
          <label for="confirmar-pf">Confirmar Senha *</label>
          <input type="password" id="confirmar-pf" placeholder="Confirme sua senha" required>
        </div>

        <!-- Termos -->
        <div class="form-group checkbox">
          <input type="checkbox" id="termos-pf" required>
          <label for="termos-pf">Concordo com os Termos de Serviço</label>
        </div>

        <button type="submit" class="btn btn-primary">Criar Conta PF</button>
      </form>
    </div>

    <!-- PJ Tab -->
    <div id="pj" class="tab-content">
      <form onsubmit="handleCadastro(event, 'PJ')">
        <!-- Nome Empresa -->
        <div class="form-group">
          <label for="nome-empresa">Nome da Empresa *</label>
          <input type="text" id="nome-empresa" placeholder="Nome da sua empresa" required>
        </div>

        <!-- CNPJ -->
        <div class="form-group">
          <label for="cnpj">CNPJ *</label>
          <input type="text" id="cnpj" placeholder="00.000.000/0000-00" required>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email-pj">Email *</label>
          <input type="email" id="email-pj" placeholder="contato@empresa.com" required>
        </div>

        <!-- Telefone -->
        <div class="form-group">
          <label for="telefone-pj">Telefone *</label>
          <input type="tel" id="telefone-pj" placeholder="(11) 99999-0000" required>
        </div>

        <!-- Responsável -->
        <div class="form-group">
          <label for="responsavel">Nome do Responsável *</label>
          <input type="text" id="responsavel" placeholder="Quem é o responsável?" required>
        </div>

        <!-- Descrição -->
        <div class="form-group">
          <label for="descricao-pj">Descrição do Negócio</label>
          <textarea id="descricao-pj" placeholder="Descreva seu negócio..." rows="3"></textarea>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <label for="senha-pj">Senha *</label>
          <input type="password" id="senha-pj" placeholder="Mínimo 6 caracteres" required>
        </div>

        <!-- Confirmar Senha -->
        <div class="form-group">
          <label for="confirmar-pj">Confirmar Senha *</label>
          <input type="password" id="confirmar-pj" placeholder="Confirme sua senha" required>
        </div>

        <!-- Termos -->
        <div class="form-group checkbox">
          <input type="checkbox" id="termos-pj" required>
          <label for="termos-pj">Concordo com os Termos de Serviço</label>
        </div>

        <button type="submit" class="btn btn-primary">Criar Conta PJ</button>
      </form>
    </div>

    <!-- Divider -->
    <div class="divider">
      <span>Já tem conta?</span>
    </div>

    <!-- Login Link -->
    <button class="btn btn-outline" onclick="window.location.href='login-empresa.html'">
      Entrar
    </button>

    <!-- Footer -->
    <div class="login-footer">
      <p>É um cliente? <a href="cadastro-cliente.html">Cadastrar como Cliente</a></p>
    </div>
  </div>
</div>

<style>
  .checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .checkbox input[type="checkbox"] {
    width: auto;
    margin: 0;
  }

  .checkbox label {
    margin: 0;
    font-size: 13px;
    cursor: pointer;
  }

  textarea {
    font-family: inherit;
    resize: vertical;
  }
</style>

<script src="config.js"></script>
<script src="cadastro-empresa.js"></script>
</body>
</html>
