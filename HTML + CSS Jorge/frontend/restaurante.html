<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Restaurante - Feedoo</title>
  <link rel="stylesheet" href="restaurante.css">
</head>

<body>

<header class="header">
  <div class="logo" onclick="voltar()">← Feedoo</div>
</header>

<section class="capa">
  <img id="capaImg">
</section>

<section class="info">
  <h1 id="nomeRestaurante"></h1>
  <div class="detalhes">
    ⭐ 4.8 • 30-40 min • R$ 5 entrega
  </div>
</section>

<!-- CATEGORIAS -->
<div class="menu-categorias">
  <button onclick="scrollPara('lanches')">🍔 Lanches</button>
  <button onclick="scrollPara('acompanhamentos')">🍟 Acompanhamentos</button>
  <button onclick="scrollPara('bebidas')">🥤 Bebidas</button>
</div>

<!-- CARDÁPIO -->
<section class="cardapio">

  <h2 id="lanches">🍔 Lanches</h2>
  <div id="listaLanches"></div>

  <h2 id="acompanhamentos">🍟 Acompanhamentos</h2>
  <div id="listaAcompanhamentos"></div>

  <h2 id="bebidas">🥤 Bebidas</h2>
  <div id="listaBebidas"></div>

</section>

<!-- CARRINHO -->
<div id="carrinho" class="carrinho hidden">
  <h2>🛒 Carrinho</h2>
  <div id="itens"></div>
  <div id="total"></div>
  <button onclick="finalizarPedido()">Finalizar Pedido</button>
</div>

<button class="btn-carrinho" onclick="toggleCarrinho()">🛒</button>

<script src="restaurante.js"></script>
</body>
</html>
